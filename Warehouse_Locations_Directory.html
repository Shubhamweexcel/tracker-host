        function renderTable(data) {
            tableBody.innerHTML = '';
            
            if (data.length === 0) {
                dataTable.style.display = 'none';
                noResults.style.display = 'block';
                stats.innerText = `Showing 0 of ${locations.length} locations`;
                return;
            }

            dataTable.style.display = 'table';
            noResults.style.display = 'none';
            stats.innerText = `Showing ${data.length} of ${locations.length} locations`;

            data.forEach(loc => {
                const tr = document.createElement('tr');
                
                const addressStr = loc.address ? loc.address : 'Address not specified';
                
                tr.innerHTML = `
                    <td>
                        <div class="location-name">${loc.name}</div>
                        <span class="meta-text">${loc.type}</span>
                    </td>
                    <td>
                        <span class="badge">${loc.district}</span>
                        <span class="meta-text">Circle: ${loc.circle}</span>
                    </td>
                    <td>
                        <div style="font-size: 0.9rem;">${addressStr}</div>
                    </td>
                    <td>

                        </button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

                loc.district.toLowerCase().includes(term) ||
                loc.circle.toLowerCase().includes(term) ||
                loc.address.toLowerCase().includes(term)
            );
            renderTable(filtered);
        });
